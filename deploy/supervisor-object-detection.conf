[program:object-detection]
command=/usr/local/bin/uvicorn object_detection_app:app --host 0.0.0.0 --port 8000
directory=/home/user/Side-Projects
autostart=true
autorestart=true
startsecs=5
startretries=3
stdout_logfile=/var/log/object-detection.log
stdout_logfile_maxbytes=10MB
stdout_logfile_backups=2
stderr_logfile=/var/log/object-detection-err.log
stderr_logfile_maxbytes=10MB
user=root
